name: Keep Supabase alive

on:
  schedule:
    # Runs at noon UTC every 3 days
    - cron: '0 12 */3 * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping keep-alive endpoint
        run: |
          response=$(curl -s -o /tmp/body -w "%{http_code}" https://wine-cellar-cyan-gamma.vercel.app/api/keep-alive)
          echo "HTTP status: $response"
          cat /tmp/body
          test "$response" = "200"
